<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="@oidfed — OpenID Federation 1.0 for JavaScript">
	<title>@oidfed — OpenID Federation 1.0 for JavaScript</title>
	<desc>Banner for the @oidfed project — the complete OpenID Federation 1.0 implementation for JavaScript. Runtime-agnostic, spec-compliant, built on Web APIs. Shows a hierarchical federation topology with a Trust Anchor, two intermediate authorities, and four leaf entities, plus the four spec packages: @oidfed/core, @oidfed/authority, @oidfed/leaf, @oidfed/oidc.</desc>

	<defs>
		<!-- Main gradient background: dark navy top-left → slightly warmer navy bottom-right -->
		<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#060d18" />
			<stop offset="50%" stop-color="#0a1628" />
			<stop offset="100%" stop-color="#0d2239" />
		</linearGradient>

		<!-- Accent glow behind the title -->
		<radialGradient id="glow" cx="50%" cy="42%" r="55%">
			<stop offset="0%" stop-color="#007acc" stop-opacity="0.32" />
			<stop offset="55%" stop-color="#007acc" stop-opacity="0.06" />
			<stop offset="100%" stop-color="#007acc" stop-opacity="0" />
		</radialGradient>

		<!-- Subtle grid pattern (dots) -->
		<pattern id="dotgrid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
			<circle cx="1.5" cy="1.5" r="1.1" fill="#1e3a5c" opacity="0.35" />
		</pattern>

		<!-- Gradient for the topology-edge accent -->
		<linearGradient id="edgeA" x1="0%" y1="0%" x2="100%" y2="0%">
			<stop offset="0%" stop-color="#007acc" stop-opacity="0.85" />
			<stop offset="100%" stop-color="#4da6ff" stop-opacity="0.85" />
		</linearGradient>

		<!-- Filters: soft glow on TA node -->
		<filter id="soft-glow" x="-60%" y="-60%" width="220%" height="220%">
			<feGaussianBlur stdDeviation="6" />
		</filter>
	</defs>

	<!-- Layer 1: Base gradient -->
	<rect width="1280" height="640" fill="url(#bg)" />

	<!-- Layer 2: Dot grid (subtle) -->
	<rect width="1280" height="640" fill="url(#dotgrid)" />

	<!-- Layer 3: Radial glow behind title -->
	<rect width="1280" height="640" fill="url(#glow)" />

	<!-- Layer 4: Federation topology watermark — offset to the right, low opacity -->
	<g opacity="0.22" transform="translate(880, 96)">
		<!-- Glow behind TA -->
		<circle cx="150" cy="40" r="44" fill="#007acc" filter="url(#soft-glow)" />

		<!-- Edges (drawn under nodes) -->
		<g stroke="url(#edgeA)" stroke-width="2.2" fill="none" stroke-linecap="round">
			<line x1="150" y1="54" x2="70" y2="164" />
			<line x1="150" y1="54" x2="230" y2="164" />
			<line x1="70" y1="182" x2="20" y2="294" />
			<line x1="70" y1="182" x2="120" y2="294" />
			<line x1="230" y1="182" x2="180" y2="294" />
			<line x1="230" y1="182" x2="280" y2="294" />
		</g>

		<!-- Trust Anchor -->
		<circle cx="150" cy="40" r="16" fill="#007acc" stroke="#80bfff" stroke-width="2" />
		<text x="150" y="14" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#80bfff" text-anchor="middle" letter-spacing="1.5">TRUST ANCHOR</text>

		<!-- Intermediates -->
		<circle cx="70" cy="174" r="12" fill="#1a3a5c" stroke="#4da6ff" stroke-width="2" />
		<circle cx="230" cy="174" r="12" fill="#1a3a5c" stroke="#4da6ff" stroke-width="2" />

		<!-- Leaves -->
		<circle cx="20" cy="304" r="9" fill="#0d2239" stroke="#4da6ff" stroke-width="1.8" />
		<circle cx="120" cy="304" r="9" fill="#0d2239" stroke="#4da6ff" stroke-width="1.8" />
		<circle cx="180" cy="304" r="9" fill="#0d2239" stroke="#4da6ff" stroke-width="1.8" />
		<circle cx="280" cy="304" r="9" fill="#0d2239" stroke="#4da6ff" stroke-width="1.8" />
	</g>

	<!-- Left-side topology mirror (for visual balance) -->
	<g opacity="0.22" transform="translate(80, 96) scale(-1, 1) translate(-300, 0)">
		<circle cx="150" cy="40" r="44" fill="#007acc" filter="url(#soft-glow)" />
		<g stroke="url(#edgeA)" stroke-width="2.2" fill="none" stroke-linecap="round">
			<line x1="150" y1="54" x2="70" y2="164" />
			<line x1="150" y1="54" x2="230" y2="164" />
			<line x1="70" y1="182" x2="20" y2="294" />
			<line x1="70" y1="182" x2="120" y2="294" />
			<line x1="230" y1="182" x2="180" y2="294" />
			<line x1="230" y1="182" x2="280" y2="294" />
		</g>
		<circle cx="150" cy="40" r="16" fill="#007acc" stroke="#80bfff" stroke-width="2" />
		<circle cx="70" cy="174" r="12" fill="#1a3a5c" stroke="#4da6ff" stroke-width="2" />
		<circle cx="230" cy="174" r="12" fill="#1a3a5c" stroke="#4da6ff" stroke-width="2" />
		<circle cx="20" cy="304" r="9" fill="#0d2239" stroke="#4da6ff" stroke-width="1.8" />
		<circle cx="120" cy="304" r="9" fill="#0d2239" stroke="#4da6ff" stroke-width="1.8" />
		<circle cx="180" cy="304" r="9" fill="#0d2239" stroke="#4da6ff" stroke-width="1.8" />
		<circle cx="280" cy="304" r="9" fill="#0d2239" stroke="#4da6ff" stroke-width="1.8" />
	</g>

	<!-- Layer 5: Central text composition -->
	<g text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
		<!-- Small pill above brand -->
		<g transform="translate(640, 152)">
			<rect x="-112" y="-20" width="224" height="34" rx="17" fill="#007acc" fill-opacity="0.12" stroke="#007acc" stroke-opacity="0.55" stroke-width="1.2" />
			<text y="4" font-size="13" font-weight="600" fill="#80bfff" letter-spacing="2.5">OPENID&#160;FEDERATION&#160;1.0</text>
		</g>

		<!-- Brand -->
		<text x="640" y="290" font-size="112" font-weight="800" fill="#ffffff" letter-spacing="-3">@oidfed</text>

		<!-- Divider -->
		<line x1="504" y1="322" x2="776" y2="322" stroke="#80bfff" stroke-opacity="0.4" stroke-width="1.4" />

		<!-- Tagline -->
		<text x="640" y="370" font-size="32" font-weight="500" fill="#ffffff">OpenID Federation 1.0 for JavaScript</text>

		<!-- Subtitle with keyword list -->
		<text x="640" y="412" font-size="19" font-weight="400" fill="#80bfff">runtime-agnostic · spec-compliant · built on Web APIs</text>

		<!-- Keyword line -->
		<text x="640" y="454" font-size="15" font-weight="400" fill="#b3d9ff" fill-opacity="0.75">Trust Anchors · Entity Configurations · Trust Chains · Metadata Policy · Trust Marks</text>
	</g>

	<!-- Layer 6: Package row at the bottom -->
	<g transform="translate(640, 542)" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
		<!-- Pill for each package -->
		<g font-size="15" font-weight="500">
			<!-- @oidfed/core -->
			<g transform="translate(-372, 0)">
				<rect x="-80" y="-16" width="160" height="32" rx="16" fill="#0b1220" stroke="#1a3a5c" stroke-width="1.2" />
				<text y="5" fill="#80bfff">@oidfed/core</text>
			</g>
			<!-- @oidfed/authority -->
			<g transform="translate(-124, 0)">
				<rect x="-96" y="-16" width="192" height="32" rx="16" fill="#0b1220" stroke="#1a3a5c" stroke-width="1.2" />
				<text y="5" fill="#80bfff">@oidfed/authority</text>
			</g>
			<!-- @oidfed/leaf -->
			<g transform="translate(124, 0)">
				<rect x="-80" y="-16" width="160" height="32" rx="16" fill="#0b1220" stroke="#1a3a5c" stroke-width="1.2" />
				<text y="5" fill="#80bfff">@oidfed/leaf</text>
			</g>
			<!-- @oidfed/oidc -->
			<g transform="translate(372, 0)">
				<rect x="-80" y="-16" width="160" height="32" rx="16" fill="#0b1220" stroke="#1a3a5c" stroke-width="1.2" />
				<text y="5" fill="#80bfff">@oidfed/oidc</text>
			</g>
		</g>
	</g>

	<!-- Layer 7: URL -->
	<text x="640" y="606" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#4da6ff" text-anchor="middle" letter-spacing="2.5" fill-opacity="0.75">OIDFED.COM · EXPLORE.OIDFED.COM · LEARN.OIDFED.COM</text>

	<!-- Decorative corner marks -->
	<g stroke="#007acc" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.55">
		<path d="M 32 32 L 32 64 M 32 32 L 64 32" />
		<path d="M 1248 32 L 1248 64 M 1248 32 L 1216 32" />
		<path d="M 32 608 L 32 576 M 32 608 L 64 608" />
		<path d="M 1248 608 L 1248 576 M 1248 608 L 1216 608" />
	</g>
</svg>
