version: 2

updates:
  # npm / pnpm / yarn dependencies for public packages + tools only
  - package-ecosystem: npm
    directories:
      - "/packages/*"
      - "/tools/*"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps)"
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions, still lives at repo root because workflows are in .github/workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps)"
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
