name: Release

on:
  push:
    tags:
      - 'core/v*.*.*'
      - 'authority/v*.*.*'
      - 'leaf/v*.*.*'
      - 'oidc/v*.*.*'
      - 'cli/v*.*.*'
      - 'all/v*.*.*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Validate, publish & release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      # npm trusted publishing requires npm CLI >= 11.5.1 (Node 22 ships with 10.x).
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Parse tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          SCOPE="${REF_NAME%%/v*}"
          VERSION="${REF_NAME#*/v}"
          echo "scope=$SCOPE"   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Build only the package(s) that are being released
      - name: Build
        env:
          SCOPE: ${{ steps.tag.outputs.scope }}
        run: |
          if [ "$SCOPE" = "all" ]; then
            pnpm build:publish
          else
            PKG="@oidfed/$SCOPE"
            # cli lives under tools/cli but is published as @oidfed/cli
            pnpm turbo run build --filter="$PKG"
          fi

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm quick:test

      - name: Verify @oidfed/core single-copy guarantee
        run: node scripts/check-single-core.mjs

      - name: Run repo scripts tests
        run: pnpm test:scripts

      - name: Verify packed package manifests
        env:
          SCOPE: ${{ steps.tag.outputs.scope }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: node scripts/check-pack-manifests.mjs --scope "$SCOPE" --expected-version "$VERSION"

      - name: Determine previous tag for compare link
        id: prev
        run: |
          SCOPE="${{ steps.tag.outputs.scope }}"
          PREV=$(git tag --list "${SCOPE}/v*" --sort=-v:refname | sed -n '2p')
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"

      - name: Extract changelog body
        env:
          SCOPE: ${{ steps.tag.outputs.scope }}
          VERSION: ${{ steps.tag.outputs.version }}
          PREV_TAG: ${{ steps.prev.outputs.tag }}
        run: node scripts/extract-changelog.mjs "$SCOPE" "$VERSION" "$PREV_TAG" > RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          name: '${{ steps.tag.outputs.scope }} v${{ steps.tag.outputs.version }}'
          body_path: RELEASE_BODY.md
          generate_release_notes: false

      - name: Publish to npm with provenance via trusted publishing
        env:
          SCOPE: ${{ steps.tag.outputs.scope }}
        run: |
          set -euo pipefail
          publish_one() {
            local dir="$1"
            pushd "$dir" >/dev/null
            pnpm pack
            local tgz
            tgz=$(ls -t ./*.tgz | head -1)
            npm publish "$tgz" --provenance --access public
            popd >/dev/null
          }
          if [ "$SCOPE" = "all" ]; then
            publish_one packages/core
            publish_one packages/authority
            publish_one packages/leaf
            publish_one packages/oidc
            publish_one tools/cli
          else
            case "$SCOPE" in
              cli) dir=tools/cli ;;
              *)   dir=packages/"$SCOPE" ;;
            esac
            publish_one "$dir"
          fi
