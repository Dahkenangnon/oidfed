name: Release

on:
  push:
    tags:
      - 'core/v*.*.*'
      - 'authority/v*.*.*'
      - 'leaf/v*.*.*'
      - 'oidc/v*.*.*'
      - 'cli/v*.*.*'
      - 'all/v*.*.*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Validate, publish & release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Derive scope (core | authority | leaf | oidc | cli | all) and version from tag
      # Tag formats: core/v1.2.3  authority/v1.2.3  all/v1.2.3
      - name: Parse tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          SCOPE="${REF_NAME%%/v*}"
          VERSION="${REF_NAME#*/v}"
          echo "scope=$SCOPE"   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Build only the package(s) that are being released
      - name: Build
        env:
          SCOPE: ${{ steps.tag.outputs.scope }}
        run: |
          if [ "$SCOPE" = "all" ]; then
            pnpm build:publish
          else
            PKG="@oidfed/$SCOPE"
            # cli lives under tools/cli but is published as @oidfed/cli
            pnpm turbo run build --filter="$PKG"
          fi

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm quick:test

      - name: Verify @oidfed/core single-copy guarantee
        run: node scripts/check-single-core.mjs

      - name: Run repo scripts tests
        run: pnpm test:scripts

      - name: Extract changelog body
        env:
          SCOPE: ${{ steps.tag.outputs.scope }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: node scripts/extract-changelog.mjs "$SCOPE" "$VERSION" > RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: '${{ steps.tag.outputs.scope }} v${{ steps.tag.outputs.version }}'
          body_path: RELEASE_BODY.md
          generate_release_notes: false

      # Publish only the package(s) that were tagged
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          SCOPE: ${{ steps.tag.outputs.scope }}
        run: |
          if [ "$SCOPE" = "all" ]; then
            pnpm -r \
              --filter '@oidfed/core' \
              --filter '@oidfed/authority' \
              --filter '@oidfed/leaf' \
              --filter '@oidfed/oidc' \
              --filter '@oidfed/cli' \
              publish --access public --no-git-checks --provenance
          else
            pnpm --filter "@oidfed/$SCOPE" publish --access public --no-git-checks --provenance
          fi
